name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format . --check

      - name: Tests
        run: pytest -v

      - name: Compile and typecheck Python
        run: |
          python -m compileall modules tests apps scripts
          pyright

      - name: Package browser extension
        run: python scripts/package_extension.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Frontend typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Frontend build
        working-directory: apps/web
        run: npm run build

      - name: Install Chromium for smoke E2E
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Frontend smoke E2E
        working-directory: apps/web
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
