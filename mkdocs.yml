site_name: SotuHire Docs
site_description: Copiloto de carreira com IA, ATS, match, scraping responsável, RAG, perfil, portfólio e tracker.
site_url: https://soturine.github.io/SotuHire/
repo_url: https://github.com/Soturine/SotuHire
repo_name: Soturine/SotuHire

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: README.md
  - Auditoria:
      - Auditoria de documentação: 00-audit/documentation-audit.md
      - Relatório local: 00-audit/local-build-report.md
  - Produto:
      - Visão: 01-product/vision.md
      - MVP: 01-product/mvp-scope.md
      - Roadmap: 01-product/roadmap.md
      - Histórias de usuário: 01-product/user-stories.md
      - Rotina inteligente de busca: 01-product/job-search-routine.md
  - Arquitetura:
      - Overview: 02-architecture/overview.md
      - Data flow: 02-architecture/data-flow.md
      - Folder structure: 02-architecture/folder-structure.md
      - Architecture decisions: 02-architecture/architecture-decisions.md
  - Regras de negócio:
