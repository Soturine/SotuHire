site_name: SotuHire Docs
site_description: Copiloto de carreira com IA, ATS, match, scraping responsável, RAG, perfil, portfólio e tracker.
site_url: https://soturine.github.io/SotuHire/
repo_url: https://github.com/Soturine/SotuHire
repo_name: Soturine/SotuHire

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

