<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SotuHire</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div>
        <strong>SotuHire</strong>
        <span>Browser Companion</span>
      </div>
      <span class="badge">v0.9</span>
    </header>
    <label class="option">
      <input id="use-ai" type="checkbox">
      Usar IA configurada no SotuHire
    </label>
    <small>A chave permanece no SotuHire local e nunca é salva na extensão.</small>
    <label class="option">
      Token local opcional
      <input id="local-token" type="password" autocomplete="off">
    </label>
    <details>
      <summary>IA standalone opcional</summary>
      <label class="option">
        Gemini API Key da extensão
        <input id="standalone-gemini-key" type="password" autocomplete="off">
      </label>
      <label class="option">
        Modelo Gemini
        <input id="standalone-gemini-model" type="text" value="gemini-2.5-flash">
      </label>
      <label class="option">
        <input id="deep-project-analysis" type="checkbox">
        Deep analysis de projetos
      </label>
      <small>Fica somente no chrome.storage.local. Prefira o Gemini via SotuHire local.</small>
    </details>
    <div class="actions">
      <button data-action="capture">Salvar vaga atual</button>
      <button data-action="capture-public-exam">Capturar edital / concurso</button>
      <button data-action="analyze" class="primary">Analisar vaga atual</button>
      <button data-action="tracker">Enviar para tracker</button>
      <button data-action="applications">Importar candidaturas visíveis</button>
      <button data-action="collect-page">Adicionar página ao lote</button>
      <button data-action="send-batch">Enviar lote acumulado</button>
      <button data-action="copy">Copiar texto extraído</button>
      <button data-action="health">Testar conexão com SotuHire</button>
      <button data-action="context-summary">Status/contexto seguro</button>
      <button data-action="project-standalone" class="primary">Analisar projeto no navegador</button>
      <button data-action="project-connected">Salvar projeto no SotuHire</button>
      <button data-action="project-evidence">Gerar evidência para Perfil</button>
      <button data-action="project-compare">Comparar projeto com vaga atual</button>
      <button data-action="project-memory">Enviar projeto para memória</button>
      <button data-action="project-profile">Salvar projeto no SotuHire</button>
    </div>
    <section id="result" aria-live="polite">Pronto para capturar a página atual.</section>
    <a href="http://127.0.0.1:8501" target="_blank" rel="noreferrer">Abrir SotuHire</a>
    <script src="project_analysis.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
